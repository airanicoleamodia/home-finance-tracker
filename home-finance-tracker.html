<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f766e">
<title>Home Finance Tracker</title>
<style>
  :root{
    --bg:#f6f7f9; --card:#fff; --ink:#15201d; --muted:#6b7a77;
    --line:#e7ebea; --brand:#0f766e; --brand-soft:#d7f0eb; --danger:#dc2626; --warn:#d97706;
    --shadow:0 1px 2px rgba(16,24,40,.06),0 8px 24px rgba(16,24,40,.06); --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;padding-bottom:96px}
  .app{max-width:480px;margin:0 auto;min-height:100vh}
  header{position:sticky;top:0;z-index:20;background:rgba(246,247,249,.85);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line);padding:14px 18px 10px}
  .title{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
  .title .dot{width:10px;height:10px;border-radius:50%;background:var(--brand)}
  .sub{font-size:12.5px;color:var(--muted);margin-top:2px}
  .month{display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:8px}
  .month button{border:1px solid var(--line);background:var(--card);width:36px;height:36px;border-radius:10px;font-size:18px;color:var(--ink);cursor:pointer;display:grid;place-items:center}
  .month .label{font-weight:600;font-size:14.5px}
  main{padding:16px 18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .section-h{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:22px 4px 10px}
  .sum-card{padding:18px;margin-bottom:16px}
  .sum-row{display:flex;align-items:stretch}
  .sum-cell{flex:1;text-align:center}
  .sum-cell .lbl{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .sum-cell .val{font-size:23px;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums}
  .sum-div{width:1px;background:var(--line);margin:4px 6px}
  .pos{color:var(--brand)}
  .net{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:14px;border-top:1px solid var(--line);font-size:14px}
  .net span{color:var(--muted)}
  .net strong{font-size:22px;font-variant-numeric:tabular-nums}
  .net.pos strong{color:var(--brand)}
  .net.neg strong{color:var(--danger)}
  .sum-card .meta{font-size:12px;color:var(--muted);text-align:center;margin-top:12px}
  .legend-inline{display:flex;gap:18px;justify-content:center;margin-top:8px;font-size:12px;color:var(--muted)}
  .legend-inline i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:middle}
  .chart-wrap{display:flex;align-items:center;gap:18px;padding:18px}
  .donut{flex:0 0 120px}
  .legend{flex:1;min-width:0}
  .legend-row{display:flex;align-items:center;gap:8px;margin:7px 0;font-size:13.5px}
  .legend-row .sw{width:10px;height:10px;border-radius:3px;flex:0 0 auto}
  .legend-row .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .legend-row .vl{font-weight:600;font-variant-numeric:tabular-nums}
  .legend-row .pc{color:var(--muted);font-size:12px;width:38px;text-align:right}
  .cat-bars{padding:6px 18px 18px}
  .bar-row{margin:12px 0}
  .bar-top{display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:5px}
  .bar-top .vl{font-variant-numeric:tabular-nums;color:var(--muted)}
  .bar-track{height:8px;background:#eef1f0;border-radius:99px;overflow:hidden}
  .bar-fill{height:100%;border-radius:99px;transition:width .4s ease}
  .list .item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line);cursor:pointer;width:100%;background:none;border-left:none;border-right:none;border-top:none;text-align:left}
  .list .item:last-child{border-bottom:none}
  .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:18px;flex:0 0 auto}
  .it-mid{flex:1;min-width:0}
  .it-mid .t1{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .it-mid .t2{font-size:12px;color:var(--muted);margin-top:1px}
  .it-amt{font-weight:700;font-variant-numeric:tabular-nums;font-size:14.5px}
  .empty{text-align:center;padding:46px 24px;color:var(--muted)}
  .empty .em{font-size:34px}.empty .et{margin-top:8px;font-size:14px}
  nav.tabs{position:fixed;left:0;right:0;bottom:0;z-index:30;max-width:480px;margin:0 auto;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:8px 8px calc(8px + env(safe-area-inset-bottom))}
  nav.tabs button{background:none;border:none;color:var(--muted);font-size:11px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 10px;border-radius:10px}
  nav.tabs button .ti{font-size:20px;line-height:1}
  nav.tabs button.active{color:var(--brand)}
  .fab{position:fixed;bottom:74px;right:max(18px,calc(50% - 240px + 18px));z-index:31;width:58px;height:58px;border-radius:50%;background:var(--brand);color:#fff;border:none;font-size:30px;line-height:1;box-shadow:0 8px 20px rgba(15,118,110,.4);cursor:pointer}
  .scrim{position:fixed;inset:0;background:rgba(16,24,40,.45);z-index:40;opacity:0;pointer-events:none;transition:opacity .2s}
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;max-width:480px;margin:0 auto;background:var(--card);border-radius:22px 22px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .26s cubic-bezier(.32,.72,0,1);max-height:92vh;overflow:auto}
  .sheet.open{transform:translateY(0)}
  .grab{width:38px;height:4px;border-radius:99px;background:#d8dedd;margin:2px auto 14px}
  .sheet h3{margin:0 0 14px;font-size:17px}
  label.fl{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:14px 2px 6px}
  input,select{width:100%;font-size:16px;padding:12px 13px;border:1px solid var(--line);border-radius:12px;background:#fbfcfc;color:var(--ink);font-family:inherit}
  input:focus,select:focus{outline:none;border-color:var(--brand);background:#fff}
  .amount-in{font-size:30px;font-weight:800;text-align:center;padding:16px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  .chip{border:1px solid var(--line);background:#fbfcfc;border-radius:99px;padding:8px 13px;font-size:13.5px;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--ink)}
  .chip.sel{background:var(--brand-soft);border-color:var(--brand);color:#0b554f;font-weight:600}
  .btn{width:100%;margin-top:20px;padding:15px;border:none;border-radius:13px;background:var(--brand);color:#fff;font-size:16px;font-weight:700;cursor:pointer}
  .btn.ghost{background:#f1f4f3;color:var(--ink);margin-top:10px}
  .btn.danger{background:#fde8e8;color:var(--danger)}
  .seg{display:flex;background:#eef1f0;border-radius:12px;padding:4px;gap:4px}
  .seg button{flex:1;border:none;background:none;padding:9px;border-radius:9px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow)}
  .seg button.on.income{color:var(--brand)}
  .switch{display:flex;align-items:center;gap:10px;margin-top:16px;font-size:13.5px}
  .switch input{width:auto;transform:scale(1.3);accent-color:var(--brand)}
  .mgr-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
  .mgr-row:last-child{border-bottom:none}
  .mgr-row .nm{flex:1;font-size:14.5px}
  .mgr-row .x{color:var(--muted);background:none;border:none;font-size:18px;cursor:pointer;padding:4px 8px}
  .add-inline{display:flex;gap:8px;margin-top:12px}
  .add-inline input{flex:1}
  .add-inline button{flex:0 0 auto;width:auto;padding:0 16px;border-radius:12px;border:none;background:var(--brand);color:#fff;font-weight:700;cursor:pointer}
  .rec-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
  .hint{font-size:12px;color:var(--muted);margin-top:8px;padding:0 2px}
  .pill{display:inline-block;font-size:11px;background:#eef1f0;color:var(--muted);padding:2px 8px;border-radius:99px;vertical-align:middle}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="title"><span class="dot"></span> Home Finance Tracker</div>
    <div class="sub">Money in vs money out — for the whole house</div>
    <div class="month" id="monthBar">
      <button id="prevM">‹</button><div class="label" id="monthLabel">—</div><button id="nextM">›</button>
    </div>
  </header>
  <main id="view"></main>
</div>
<button class="fab" id="fab">+</button>
<nav class="tabs">
  <button data-tab="dashboard" class="active"><span class="ti">📊</span>Dashboard</button>
  <button data-tab="history"><span class="ti">🧾</span>History</button>
  <button data-tab="settings"><span class="ti">⚙️</span>Settings</button>
</nav>
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"></div>

<script>
"use strict";
var KEY="hft_data_v2", C="₱";
var DEF=[
 {id:"groceries",name:"Groceries",icon:"🛒",color:"#0f766e"},{id:"utilities",name:"Utilities",icon:"💡",color:"#2563eb"},
 {id:"rent",name:"Rent / Mortgage",icon:"🏠",color:"#7c3aed"},{id:"transport",name:"Transport",icon:"🚗",color:"#d97706"},
 {id:"dining",name:"Eating Out",icon:"🍽️",color:"#dc2626"},{id:"health",name:"Health",icon:"💊",color:"#059669"},
 {id:"household",name:"Household",icon:"🧴",color:"#0891b2"},{id:"kids",name:"Kids / School",icon:"🎒",color:"#db2777"},
 {id:"leisure",name:"Leisure",icon:"🎬",color:"#9333ea"},{id:"other",name:"Other",icon:"📦",color:"#6b7280"}];
var PAL=["#0f766e","#2563eb","#d97706","#dc2626","#7c3aed","#059669","#0891b2","#db2777","#9333ea","#65a30d"];
var MO=["January","February","March","April","May","June","July","August","September","October","November","December"];

function readStore(){try{var d=JSON.parse(localStorage.getItem(KEY));if(d&&d.expenses)return d;}catch(e){}
 return{categories:DEF.slice(),people:["Me","Partner"],expenses:[],income:[],recurring:[]};}
var S=readStore();
function save(){localStorage.setItem(KEY,JSON.stringify(S));}
function $(s){return document.querySelector(s);}
function fmt(n){return C+Number(n||0).toLocaleString("en-PH",{maximumFractionDigits:2});}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function cat(id){return S.categories.find(function(c){return c.id===id;})||{name:"Unknown",icon:"❓",color:"#999"};}
var cur=new Date();cur.setDate(1);
function ym(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}
function addYm(k,delta){var p=k.split("-").map(Number);var d=new Date(p[0],p[1]-1+delta,1);return ym(d);}

function expandRec(k){var p=k.split("-").map(Number);var last=new Date(p[0],p[1],0).getDate();
 return S.recurring.filter(function(r){return(!r.start||r.start<=k);}).map(function(r){var day=Math.min(r.day||1,last);
  return{id:"rec:"+r.id+":"+k,amount:+r.amount,source:r.source||"Salary",person:r.person||"",
   date:k+"-"+String(day).padStart(2,"0"),recurring:true};});}
function monthExp(k){return S.expenses.filter(function(e){return e.date.slice(0,7)===k;}).sort(function(a,b){return b.date.localeCompare(a.date);});}
function monthInc(k){var real=S.income.filter(function(e){return e.date.slice(0,7)===k;}).map(function(e){return Object.assign({},e,{recurring:false});});
 return real.concat(expandRec(k)).sort(function(a,b){return b.date.localeCompare(a.date);});}

var tab="dashboard";
function setLabel(){$("#monthLabel").textContent=MO[cur.getMonth()]+" "+cur.getFullYear();}
function render(){setLabel();$("#monthBar").style.display=(tab==="settings")?"none":"flex";
 if(tab==="dashboard")dash();else if(tab==="history")hist();else settings();}

function dash(){var k=ym(cur);var ex=monthExp(k),inc=monthInc(k);
 var te=ex.reduce(function(s,e){return s+ +e.amount;},0),ti=inc.reduce(function(s,e){return s+ +e.amount;},0),net=ti-te;
 var h='<div class="card sum-card">'
  +'<div class="sum-row"><div class="sum-cell"><div class="lbl">Income</div><div class="val pos">'+fmt(ti)+'</div></div>'
  +'<div class="sum-div"></div><div class="sum-cell"><div class="lbl">Spent</div><div class="val">'+fmt(te)+'</div></div></div>'
  +'<div class="net '+(net>=0?"pos":"neg")+'"><span>'+(net>=0?"Money left":"Overspent")+'</span><strong>'+(net<0?"−":"")+fmt(Math.abs(net))+'</strong></div>'
  +'<div class="meta">'+MO[cur.getMonth()]+" "+cur.getFullYear()+" · "+inc.length+" income · "+ex.length+" expense"+(ex.length!==1?"s":"")+'</div></div>';
 var tr=[];for(var i=5;i>=0;i--){var mk=addYm(k,-i);
  var e2=monthExp(mk).reduce(function(s,x){return s+ +x.amount;},0);var n2=monthInc(mk).reduce(function(s,x){return s+ +x.amount;},0);
  tr.push({m:mk,inc:n2,exp:e2});}
 var mx=Math.max.apply(null,[1].concat(tr.map(function(t){return Math.max(t.inc,t.exp);})));
 var W=320,H=140,pad=22,bw=(W-pad*2)/tr.length;var bars="";
 tr.forEach(function(t,i){var x=pad+i*bw;var ih=t.inc/mx*(H-42),eh=t.exp/mx*(H-42),w=bw*.32;
  bars+='<rect x="'+(x+bw*.18)+'" y="'+(H-22-ih)+'" width="'+w+'" height="'+ih+'" rx="3" fill="#0f766e"/>'
   +'<rect x="'+(x+bw*.5)+'" y="'+(H-22-eh)+'" width="'+w+'" height="'+eh+'" rx="3" fill="#cbd5d2"/>'
   +'<text x="'+(x+bw*.5)+'" y="'+(H-8)+'" text-anchor="middle" font-size="9" fill="#6b7a77">'+MO[t.m.split("-")[1]-1].slice(0,1)+'</text>';});
 h+='<div class="section-h">6-month trend</div><div class="card" style="padding:14px">'
  +'<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="150">'+bars+'</svg>'
  +'<div class="legend-inline"><span><i style="background:#0f766e"></i>Income</span><span><i style="background:#cbd5d2"></i>Spent</span></div></div>';
 if(!ex.length){h+='<div class="card empty" style="margin-top:16px"><div class="em">🪙</div><div class="et">No expenses yet this month.<br>Tap + to add income or an expense.</div></div>';$("#view").innerHTML=h;return;}
 var by={};ex.forEach(function(e){by[e.category]=(by[e.category]||0)+ +e.amount;});
 var g=Object.keys(by).map(function(id){return{id:id,v:by[id],c:cat(id)};}).sort(function(a,b){return b.v-a.v;});
 var acc=0,R=54,CC=2*Math.PI*R;
 var segs=g.map(function(x,i){var f=x.v/te;var s={id:x.id,v:x.v,c:x.c,col:x.c.color||PAL[i%PAL.length],len:f*CC,off:CC-acc*CC};acc+=f;return s;});
 var cir=segs.map(function(s){return '<circle r="'+R+'" cx="60" cy="60" fill="none" stroke="'+s.col+'" stroke-width="14" stroke-dasharray="'+s.len+' '+(CC-s.len)+'" stroke-dashoffset="'+s.off+'" transform="rotate(-90 60 60)"/>';}).join("");
 var leg=segs.slice(0,6).map(function(s){return '<div class="legend-row"><span class="sw" style="background:'+s.col+'"></span><span class="nm">'+s.c.icon+" "+s.c.name+'</span><span class="vl">'+fmt(s.v)+'</span><span class="pc">'+Math.round(s.v/te*100)+'%</span></div>';}).join("");
 h+='<div class="section-h">Where the money went</div><div class="card"><div class="chart-wrap">'
  +'<svg class="donut" viewBox="0 0 120 120" width="120" height="120"><circle r="'+R+'" cx="60" cy="60" fill="none" stroke="#eef1f0" stroke-width="14"/>'+cir+'<text x="60" y="58" text-anchor="middle" font-size="20">'+g[0].c.icon+'</text></svg>'
  +'<div class="legend">'+leg+'</div></div></div>';
 var mxb=g[0].v;
 h+='<div class="section-h">By category</div><div class="card cat-bars">'+g.map(function(x){return '<div class="bar-row"><div class="bar-top"><span class="nm">'+x.c.icon+" "+x.c.name+'</span><span class="vl">'+fmt(x.v)+'</span></div><div class="bar-track"><div class="bar-fill" style="width:'+Math.max(4,x.v/mxb*100)+'%;background:'+x.c.color+'"></div></div></div>';}).join("")+'</div>';
 $("#view").innerHTML=h;}

function hist(){var k=ym(cur);
 var rows=monthExp(k).map(function(e){return Object.assign({},e,{kind:"expense"});}).concat(monthInc(k).map(function(e){return Object.assign({},e,{kind:"income"});})).sort(function(a,b){return b.date.localeCompare(a.date);});
 if(!rows.length){$("#view").innerHTML='<div class="card empty"><div class="em">🧾</div><div class="et">Nothing here this month yet.</div></div>';return;}
 var items=rows.map(function(r){var d=new Date(r.date+"T00:00:00");var dt=d.getDate()+" "+MO[d.getMonth()].slice(0,3);
  if(r.kind==="income"){var sub=dt+" · "+(r.person||"—")+(r.recurring?" · auto":"")+(r.note?" · "+esc(r.note):"");
   return '<button class="item" data-i="'+(r.recurring?"":r.id)+'" '+(r.recurring?'style="cursor:default" disabled':'')+'><div class="ic" style="background:'+hexA('#0f766e',.14)+'">💰</div><div class="it-mid"><div class="t1">'+esc(r.source)+(r.recurring?' <span class="pill">monthly</span>':'')+'</div><div class="t2">'+sub+'</div></div><div class="it-amt" style="color:var(--brand)">+'+fmt(r.amount)+'</div></button>';}
  var c=cat(r.category);var sub2=dt+" · "+(r.person||"—")+(r.note?" · "+esc(r.note):"");
  return '<button class="item" data-e="'+r.id+'"><div class="ic" style="background:'+hexA(c.color,.14)+'">'+c.icon+'</div><div class="it-mid"><div class="t1">'+c.name+'</div><div class="t2">'+sub2+'</div></div><div class="it-amt">−'+fmt(r.amount)+'</div></button>';}).join("");
 $("#view").innerHTML='<div class="section-h">'+MO[cur.getMonth()]+' <span class="pill">'+rows.length+'</span></div><div class="card list">'+items+'</div>';
 Array.prototype.forEach.call(document.querySelectorAll("[data-e]"),function(el){el.onclick=function(){openSheet("expense",el.dataset.e);};});
 Array.prototype.forEach.call(document.querySelectorAll("[data-i]"),function(el){if(el.dataset.i)el.onclick=function(){openSheet("income",el.dataset.i);};});}

function settings(){
 var ppl=S.people.map(function(p,i){return '<div class="mgr-row"><div class="nm">👤 '+esc(p)+'</div>'+(S.people.length>1?'<button class="x" data-delp="'+i+'">✕</button>':'<span class="pill">keep ≥1</span>')+'</div>';}).join("");
 var cats=S.categories.map(function(c){return '<div class="mgr-row"><div class="ic" style="background:'+hexA(c.color,.14)+';width:32px;height:32px;border-radius:9px;font-size:16px">'+c.icon+'</div><div class="nm">'+c.name+'</div>'+(DEF.some(function(d){return d.id===c.id;})?'<span class="pill">default</span>':'<button class="x" data-delc="'+c.id+'">✕</button>')+'</div>';}).join("");
 var recs=S.recurring.map(function(r){return '<div class="mgr-row"><div class="ic" style="background:'+hexA('#0f766e',.14)+';width:32px;height:32px;border-radius:9px;font-size:16px">💰</div><div class="nm">'+esc(r.source)+' · '+fmt(r.amount)+'<div class="hint" style="margin:0">day '+r.day+' · '+esc(r.person||"—")+'</div></div><button class="x" data-delr="'+r.id+'">✕</button></div>';}).join("");
 var opts=S.people.map(function(p){return '<option value="'+esc(p)+'">'+esc(p)+'</option>';}).join("");
 $("#view").innerHTML=
  '<div class="section-h">Recurring income <span class="pill">'+S.recurring.length+'</span></div>'
  +'<div class="card" style="padding:6px 16px 16px">'+(recs||'<div class="hint" style="padding:10px 0">No recurring income yet. Add your salary so it counts automatically every month.</div>')
  +'<label class="fl">Add salary / recurring income</label>'
  +'<div class="rec-grid"><input id="rAmt" inputmode="decimal" placeholder="'+C+' amount"><input id="rSrc" placeholder="Source (e.g. Salary)" value="Salary"><input id="rDay" inputmode="numeric" placeholder="Day (1-31)" value="15"><select id="rWho">'+opts+'</select></div>'
  +'<button class="btn" id="addRec" style="margin-top:12px">Add recurring income</button>'
  +'<div class="hint">e.g. '+C+'30,000 Salary on day 15 — auto-counted every month.</div></div>'
  +'<div class="section-h">People <span class="pill">'+S.people.length+'</span></div>'
  +'<div class="card" style="padding:6px 16px 16px">'+ppl+'<div class="add-inline"><input id="newP" placeholder="Add a person…" maxlength="24"><button id="addP">Add</button></div><div class="hint">Built to scale — add as many members as you like.</div></div>'
  +'<div class="section-h">Categories</div>'
  +'<div class="card" style="padding:6px 16px 16px">'+cats+'<div class="add-inline"><input id="newC" placeholder="Add a category…" maxlength="24"><button id="addC">Add</button></div></div>'
  +'<div class="section-h">Data</div>'
  +'<div class="card" style="padding:16px"><button class="btn ghost" id="exp">⬇️ Export backup (.json)</button><button class="btn danger" id="clr">Clear all data</button></div>'
  +'<div class="hint" style="text-align:center;margin-top:18px">Standalone demo · '+C+' Philippine Peso<br>The full app adds login, shared sync &amp; Claude (MCP).</div>';
 $("#addRec").onclick=function(){var a=parseFloat(($("#rAmt").value||"").replace(/[^0-9.]/g,""));var day=Math.min(31,Math.max(1,parseInt($("#rDay").value,10)||1));if(!a){alert("Enter an amount.");return;}S.recurring.push({id:uid(),amount:a,source:$("#rSrc").value.trim()||"Salary",day:day,person:$("#rWho").value,start:ym(new Date())});save();render();};
 $("#addP").onclick=function(){var v=$("#newP").value.trim();if(v){S.people.push(v);save();render();}};
 $("#addC").onclick=function(){var v=$("#newC").value.trim();if(v){S.categories.push({id:uid(),name:v,icon:"🏷️",color:PAL[S.categories.length%PAL.length]});save();render();}};
 Array.prototype.forEach.call(document.querySelectorAll("[data-delp]"),function(b){b.onclick=function(){S.people.splice(+b.dataset.delp,1);save();render();};});
 Array.prototype.forEach.call(document.querySelectorAll("[data-delc]"),function(b){b.onclick=function(){var id=b.dataset.delc;if(S.expenses.some(function(e){return e.category===id;})){alert("This category has expenses.");return;}S.categories=S.categories.filter(function(c){return c.id!==id;});save();render();};});
 Array.prototype.forEach.call(document.querySelectorAll("[data-delr]"),function(b){b.onclick=function(){S.recurring=S.recurring.filter(function(r){return r.id!==b.dataset.delr;});save();render();};});
 $("#exp").onclick=function(){var b=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="home-finance-backup.json";a.click();};
 $("#clr").onclick=function(){if(confirm("Delete ALL data on this device?")){localStorage.removeItem(KEY);S=readStore();render();}};}

var curKind="expense",editId=null,fCat=null,fWho=null,fSrc="Salary";
function openSheet(kind,id){curKind=kind;editId=id||null;
 var e=id?(kind==="expense"?S.expenses.find(function(x){return x.id===id;}):S.income.find(function(x){return x.id===id;})):null;
 fCat=e&&kind==="expense"?e.category:(S.categories[0]&&S.categories[0].id);
 fWho=e?e.person:S.people[0];fSrc=e&&kind==="income"?e.source:"Salary";
 var today=e?e.date:new Date().toISOString().slice(0,10);
 var inc=kind==="income";
 function peopleChips(){return S.people.map(function(p){return '<button type="button" class="chip '+(p===fWho?'sel':'')+'" data-who="'+esc(p)+'">👤 '+esc(p)+'</button>';}).join("");}
 function catChips(){return S.categories.map(function(c){return '<button type="button" class="chip '+(c.id===fCat?'sel':'')+'" data-cat="'+c.id+'">'+c.icon+" "+c.name+'</button>';}).join("");}
 function srcChips(){return["Salary","Bonus","Side gig","Gift","Other"].map(function(s){return '<button type="button" class="chip '+(s===fSrc?'sel':'')+'" data-src="'+s+'">'+s+'</button>';}).join("");}
 $("#sheet").innerHTML='<div class="grab"></div>'
  +(id?"":'<div class="seg"><button class="'+(inc?"":"on")+'" id="kExp">− Expense</button><button class="'+(inc?"on income":"")+'" id="kInc">+ Income</button></div>')
  +'<h3>'+(id?(inc?"Edit income":"Edit expense"):(inc?"Add income":"Add expense"))+'</h3>'
  +'<input id="amt" class="amount-in" inputmode="decimal" placeholder="'+C+'0" value="'+(e?e.amount:"")+'" '+(inc?'style="color:var(--brand)"':'')+'>'
  +(inc?'<label class="fl">Source</label><div class="chips" id="srcChips">'+srcChips()+'</div>'
   +'<label class="fl">Or custom source</label><input id="srcIn" value="'+esc(fSrc)+'">'
   +'<label class="fl">Who earned it</label><div class="chips" id="whoChips">'+peopleChips()+'</div>'
   +'<label class="fl">Date received</label><input type="date" id="date" value="'+today+'">'
   +(id?"":'<label class="switch"><input type="checkbox" id="rep"> <span>Repeat every month</span></label>')
  :'<label class="fl">Category</label><div class="chips" id="catChips">'+catChips()+'</div>'
   +'<label class="fl">Who paid</label><div class="chips" id="whoChips">'+peopleChips()+'</div>'
   +'<label class="fl">Date</label><input type="date" id="date" value="'+today+'">')
  +'<label class="fl">Note (optional)</label><input id="note" value="'+(e?esc(e.note||''):'')+'" placeholder="'+(inc?'e.g. May payroll':'e.g. market run')+'">'
  +'<button class="btn" id="saveB">'+(id?"Save changes":(inc?"Add income":"Add expense"))+'</button>'
  +(id?'<button class="btn danger" id="delB">Delete</button>':'')
  +'<button class="btn ghost" id="cancelB">Cancel</button>';
 if(!id){$("#kExp").onclick=function(){openSheet("expense",null);};$("#kInc").onclick=function(){openSheet("income",null);};}
 var wc=$("#whoChips");if(wc)wc.onclick=function(ev){var b=ev.target.closest("[data-who]");if(!b)return;fWho=b.dataset.who;Array.prototype.forEach.call(wc.children,function(x){x.classList.toggle("sel",x.dataset.who===fWho);});};
 if(inc){var sc=$("#srcChips");sc.onclick=function(ev){var b=ev.target.closest("[data-src]");if(!b)return;fSrc=b.dataset.src;$("#srcIn").value=fSrc;Array.prototype.forEach.call(sc.children,function(x){x.classList.toggle("sel",x.dataset.src===fSrc);});};
  $("#srcIn").oninput=function(ev){fSrc=ev.target.value;};}
 else{var cc=$("#catChips");cc.onclick=function(ev){var b=ev.target.closest("[data-cat]");if(!b)return;fCat=b.dataset.cat;Array.prototype.forEach.call(cc.children,function(x){x.classList.toggle("sel",x.dataset.cat===fCat);});};}
 $("#saveB").onclick=saveEntry;$("#cancelB").onclick=closeSheet;
 if(id)$("#delB").onclick=function(){if(confirm("Delete this entry?")){if(curKind==="expense")S.expenses=S.expenses.filter(function(x){return x.id!==id;});else S.income=S.income.filter(function(x){return x.id!==id;});save();closeSheet();render();}};
 $("#scrim").classList.add("open");$("#sheet").classList.add("open");
 if(!id)setTimeout(function(){$("#amt").focus();},250);}
function closeSheet(){$("#scrim").classList.remove("open");$("#sheet").classList.remove("open");editId=null;}
function saveEntry(){var amt=parseFloat(($("#amt").value||"").replace(/[^0-9.]/g,""));
 if(!amt||amt<=0){$("#amt").style.borderColor="var(--danger)";return;}
 var date=$("#date").value||new Date().toISOString().slice(0,10);var note=$("#note").value.trim();
 if(curKind==="expense"){if(editId){Object.assign(S.expenses.find(function(x){return x.id===editId;}),{amount:amt,category:fCat,person:fWho,date:date,note:note});}
  else{S.expenses.push({id:uid(),amount:amt,category:fCat,person:fWho,date:date,note:note});cur=new Date(date+"T00:00:00");cur.setDate(1);}}
 else{var rep=$("#rep")&&$("#rep").checked;
  if(!editId&&rep){var day=parseInt(date.slice(8,10),10)||1;S.recurring.push({id:uid(),amount:amt,source:fSrc||"Salary",day:day,person:fWho,start:date.slice(0,7),note:note});cur=new Date(date+"T00:00:00");cur.setDate(1);}
  else if(editId){Object.assign(S.income.find(function(x){return x.id===editId;}),{amount:amt,source:fSrc||"Income",person:fWho,date:date,note:note});}
  else{S.income.push({id:uid(),amount:amt,source:fSrc||"Income",person:fWho,date:date,note:note});cur=new Date(date+"T00:00:00");cur.setDate(1);}}
 save();closeSheet();render();}

function esc(s){return(s||"").replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function hexA(hex,a){var h=(hex||"#999").replace("#","");var n=parseInt(h.length===3?h.split("").map(function(x){return x+x;}).join(""):h,16);return"rgba("+((n>>16)&255)+","+((n>>8)&255)+","+(n&255)+","+a+")";}

$("#fab").onclick=function(){openSheet("expense",null);};
$("#scrim").onclick=closeSheet;
$("#prevM").onclick=function(){cur.setMonth(cur.getMonth()-1);render();};
$("#nextM").onclick=function(){cur.setMonth(cur.getMonth()+1);render();};
Array.prototype.forEach.call(document.querySelectorAll("nav.tabs button"),function(b){b.onclick=function(){tab=b.dataset.tab;Array.prototype.forEach.call(document.querySelectorAll("nav.tabs button"),function(x){x.classList.toggle("active",x===b);});render();};});
render();
</script>
</body>
